<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BUCAM S.R.L. | Seguridad Privada{% endblock %}</title>
    <style>
        :root{--bg:#111;--panel:#1a1a1a;--panel2:#222;--ink:#f5f7fb;--muted:#a5acb8;--line:rgba(255,255,255,.08);--brand:#16b7d6;--shadow:0 28px 60px rgba(0,0,0,.35)}
        *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#121212 0%,#0d0d0d 100%);color:var(--ink);font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif}
        a{color:inherit;text-decoration:none} .shell{width:min(1180px,calc(100% - 32px));margin:0 auto}
        .top{margin:18px auto 0;padding:28px 24px;text-align:center;background:linear-gradient(135deg,rgba(255,255,255,.92),rgba(236,238,243,.92));color:#0c3656}
        .top h1{margin:0;font:700 clamp(2rem,4vw,3.2rem) Georgia,serif}.top p{margin:8px 0 0;font-style:italic}
        .nav,.ticker,.card,.section,.sidebar-card,.cta,.detail-card,.page-hero,.page-section,.recent-item,.article{border:1px solid var(--line);background:var(--panel)}
        .nav{margin-top:24px}.nav-inner,.ticker{display:flex;gap:14px;align-items:center;flex-wrap:wrap;padding:16px 18px}
        .nav a{font:700 1rem "Arial Narrow","Bahnschrift SemiCondensed",sans-serif;text-transform:uppercase;padding:8px 10px;border-radius:999px}
        .nav a:hover,.nav a.is-active,.btn{background:var(--brand);color:#00161d}.ticker{margin-top:10px;color:var(--muted)}
        h1,h2,h3{margin:0 0 10px;font-family:"Arial Narrow","Bahnschrift SemiCondensed",sans-serif;text-transform:uppercase;line-height:1.1}
        .page-hero{margin-top:28px;padding:36px;background:linear-gradient(135deg,rgba(12,54,86,.82),rgba(16,16,16,.9));box-shadow:var(--shadow)}
        .eyebrow,.label{display:inline-block;padding:8px 12px;margin-bottom:14px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);color:#d7f8ff;text-transform:uppercase;font-size:.78rem}
        .btn{display:inline-block;padding:12px 16px;border-radius:999px;font-weight:700;margin-top:14px}
        .page-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:28px 0 42px}
        .page-section{padding:24px;box-shadow:var(--shadow)} .page-section p,.page-hero p,.section p,.sidebar-card p,.card p,.article,.recent-item{color:var(--muted);line-height:1.7}
        .footer-space{height:24px}
        @media (max-width:980px){.page-grid{grid-template-columns:1fr}}
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <header class="shell top">
        <h1>BUCAM S.R.L.</h1>
        <p>Seguridad Privada &amp; Proteccion Integral</p>
    </header>
    <nav class="shell nav">
        <div class="nav-inner">
            {% for item in nav_pages %}
                <a href="{% url item.url_name %}"{% if current_page == item.slug %} class="is-active"{% endif %}>{{ item.title }}</a>
            {% endfor %}
        </div>
    </nav>
    {% block ticker %}{% endblock %}
    {% block content %}{% endblock %}
    <div class="footer-space"></div>
</body>
</html>
